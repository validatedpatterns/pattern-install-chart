suite: Test subscription namespace configuration
templates:
  - templates/subscription.yaml
  - templates/pattern.yaml
  - templates/pattern-operator-configmap.yaml
  - templates/subscription-namespace.yaml
tests:
  - it: Should use default openshift-operators namespace for subscription
    template: templates/subscription.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: openshift-operators

  - it: Should use custom namespace for subscription
    template: templates/subscription.yaml
    set:
      main:
        patternsOperator:
          subscriptionNamespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: Should use default openshift-operators namespace for pattern
    template: templates/pattern.yaml
    release:
      name: release-test
    asserts:
      - equal:
          path: metadata.namespace
          value: openshift-operators

  - it: Should use custom namespace for pattern
    template: templates/pattern.yaml
    release:
      name: release-test
    set:
      main:
        patternsOperator:
          subscriptionNamespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: Should use default openshift-operators namespace for configmap
    template: templates/pattern-operator-configmap.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: openshift-operators

  - it: Should use custom namespace for configmap
    template: templates/pattern-operator-configmap.yaml
    set:
      main:
        patternsOperator:
          subscriptionNamespace: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: Should not create namespace when using default openshift-operators
    template: templates/subscription-namespace.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: Should create namespace when using custom namespace
    template: templates/subscription-namespace.yaml
    set:
      main:
        patternsOperator:
          subscriptionNamespace: custom-namespace
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Namespace
        documentIndex: 0
      - equal:
          path: metadata.name
          value: custom-namespace
        documentIndex: 0
      - isKind:
          of: OperatorGroup
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: custom-namespace
        documentIndex: 1
      - equal:
          path: metadata.name
          value: patterns-operator-group
        documentIndex: 1

  - it: Should not create namespace or operatorgroup when patternsOperator is disabled with default namespace
    template: templates/subscription-namespace.yaml
    set:
      main:
        patternsOperator:
          enableSubscription: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should not create namespace or operatorgroup when patternsOperator is disabled with custom namespace
    template: templates/subscription-namespace.yaml
    set:
      main:
        patternsOperator:
          enableSubscription: false
          subscriptionNamespace: custom-namespace
    asserts:
      - hasDocuments:
          count: 0

  - it: Should not create subscription when patternsOperator is disabled
    template: templates/subscription.yaml
    set:
      main:
        patternsOperator:
          enableSubscription: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Should still create pattern when patternsOperator is disabled
    template: templates/pattern.yaml
    release:
      name: release-test
    set:
      main:
        patternsOperator:
          enableSubscription: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Pattern

  - it: Should still create configmap when patternsOperator is disabled
    template: templates/pattern-operator-configmap.yaml
    set:
      main:
        patternsOperator:
          enableSubscription: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
